<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>flow. tests</title>
  <style>
    body { font-family: 'DM Mono', monospace; background: #0e0e0f; color: #f4f4f5; padding: 2rem; font-size: 14px; }
    h1 { color: #a78bfa; font-size: 16px; margin-bottom: 1.5rem; font-weight: 500; }
    .suite { margin-bottom: 2rem; }
    .suite-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #71717a; margin-bottom: 0.75rem; }
    .test { display: flex; gap: 12px; align-items: flex-start; padding: 6px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
    .pass { color: #34d399; }
    .fail { color: #f87171; }
    .icon { width: 16px; flex-shrink: 0; }
    .desc { flex: 1; }
    .expected { color: #71717a; font-size: 12px; margin-top: 2px; }
    .summary { margin-top: 2rem; font-size: 13px; padding: 1rem; background: #18181b; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.07); }
    .summary.all-pass { border-color: #34d399; color: #34d399; }
    .summary.has-fail { border-color: #f87171; color: #f87171; }
  </style>
</head>
<body>
  <h1>flow. test suite (tests made maually, formatted by Claude)</h1>
  <div id="output"></div>
  <div id="summary" class="summary"></div>

<script>
const results = [];

function assert(description, actual, expected) {
  const pass = actual === expected;
  results.push({ description, actual, expected, pass });
}

function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  return [hours, minutes, seconds].map(n => String(n).padStart(2, '0')).join(':');
}

function formatDuration(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  if (hours > 0) return `${hours}h ${minutes}m`;
  if (minutes > 0) return `${minutes}m ${seconds}s`;
  return `${seconds}s`;
}

function getHeatmapLevel(ms, maxMs) {
  if (ms === 0) return 0;
  if (ms < maxMs * 0.25) return 1;
  if (ms < maxMs * 0.50) return 2;
  if (ms < maxMs * 0.75) return 3;
  return 4;
}

function getTodayMsFromSessions(sessions) {
  const today = new Date().toDateString();
  return sessions
    .filter(s => new Date(s.timestamp).toDateString() === today)
    .reduce((sum, s) => sum + s.duration, 0);
}

function getGoalPct(spentMs, goalMs) {
  return Math.min(100, Math.round((spentMs / goalMs) * 100));
}

const suites = [
  {
    name: 'goal bar — caps and scales correctly',
    tests: () => {
      const GOAL = 2 * 60 * 60 * 1000;
      assert('0 ms is 0%', getGoalPct(0, GOAL), 0);
      assert('1 hour is 50%', getGoalPct(GOAL / 2, GOAL), 50);
      assert('2 hours is 100%', getGoalPct(GOAL, GOAL), 100);
      assert('over goal caps at 100%', getGoalPct(GOAL * 2, GOAL), 100);
      assert('30 min is 25%', getGoalPct(30 * 60 * 1000, GOAL), 25);
    }
  },
  {
    name: 'today filter — only counts todays sessions',
    tests: () => {
      const now = new Date().toISOString();
      const yesterday = new Date(Date.now() - 86400000).toISOString();
      const sessions = [
        { timestamp: now, duration: 60000 },
        { timestamp: now, duration: 30000 },
        { timestamp: yesterday, duration: 99999 },
      ];
      assert('sums only todays durations', getTodayMsFromSessions(sessions), 90000);
      assert('empty sessions returns 0', getTodayMsFromSessions([]), 0);
      assert('excludes yesterday completely', getTodayMsFromSessions([{ timestamp: yesterday, duration: 5000 }]), 0);
    }
  }
];

const output = document.getElementById('output');
let passed = 0;
let failed = 0;

suites.forEach(suite => {
  suite.tests();
  const suiteResults = results.splice(0);

  const div = document.createElement('div');
  div.className = 'suite';
  div.innerHTML = `<div class="suite-name">${suite.name}</div>` +
    suiteResults.map(r => {
      if (r.pass) passed++;
      else failed++;
      return `<div class="test">
        <span class="icon ${r.pass ? 'pass' : 'fail'}">${r.pass ? '✓' : '✗'}</span>
        <div class="desc">
          <div class="${r.pass ? 'pass' : 'fail'}">${r.description}</div>
          ${!r.pass ? `<div class="expected">expected: ${JSON.stringify(r.expected)} got: ${JSON.stringify(r.actual)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  output.appendChild(div);
});

const summary = document.getElementById('summary');
const total = passed + failed;
summary.textContent = `${passed}/${total} passed${failed > 0 ? ` — ${failed} failing` : ' — all good'}`;
summary.className = 'summary ' + (failed === 0 ? 'all-pass' : 'has-fail');
</script>
</body>
</html>
